<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayPal Dashboard UI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <!-- Top Right Icons -->
  <div class="top-icons">
    <a href="#" class="icon-btn">
      <img src="images/notifications.png" alt="Notifications">
    </a>

    <a href="#" class="icon-btn">
      <img src="images/profile.png" alt="Profile">
    </a>
  </div>

  <!-- Balance Card -->
  <div class="card balance-card">
    <div class="paypal-logo">
      <img src="images/paypal-logo.png" alt="PayPal">
    </div>
    <div>
      <div class="balance-amount">US$1,58</div>
      <div class="balance-label">PayPal balance</div>
    </div>
  </div>

  <!-- Send Again -->
  <div class="section-title">Send again</div>

  <div class="send-row" id="sendRow">
    <a href="#" class="send-item">
      <div class="avatar blue">MM</div>
      <div class="send-name">Monyai Salome Mok...</div>
    </a>

    <a href="#" class="send-item">
      <div class="avatar black">SM</div>
      <div class="send-name">Steve Marubu</div>
    </a>

    <a href="#" class="send-item">
      <div class="avatar black">
        <svg viewBox="0 0 24 24">
          <path d="M4 4h16l-1.5 6H5.5L4 4zm1 8h14v8H5v-8z"/>
        </svg>
      </div>
      <div class="send-name">Wellness on the Spot LLC</div>
    </a>

    <a href="#" class="send-item">
      <div class="avatar blue">
        <svg viewBox="0 0 24 24">
          <path d="M21 20l-5.6-5.6a7 7 0 1 0-1.4 1.4L20 21z"/>
        </svg>
      </div>
      <div class="send-name">Search</div>
    </a>
  </div>

  <!-- Transaction Card -->
  <div class="card transaction-card">
    <div class="transaction-top">

      <div class="profile-pic">
        <img src="images/ali-khan.jpg" alt="Ali Khan">
      </div>

      <div class="transaction-info">
        <div class="name">Ali Khan</div>
        <div class="date">02 Nov 2025</div>
      </div>

      <div class="amount">-US$10</div>
    </div>

    <div class="transaction-label">Money sent</div>
    <div class="transaction-note">"SQR400 ORACLE FLASH"</div>

    <div class="divider"></div>
    <a href="#" class="see-more">See more</a>
  </div>

</div>

<!-- Sticky Bottom -->
<div class="sticky-bottom">
  <div class="actions">
    <a href="#" class="action-btn">Send</a>
    <a href="#" class="action-btn">Request</a>
  </div>

  <nav class="bottom-nav">
    <a href="#" class="nav-item active">
      <img src="images/home.png" alt="Home">
      <span>Home</span>
    </a>

    <a href="#" class="nav-item">
      <img src="images/payments.png" alt="Payments">
      <span>Payments</span>
    </a>

    <a href="#" class="nav-item">
      <img src="images/wallet.png" alt="Wallet">
      <span>Wallet</span>
    </a>
  </nav>
</div>

<script>
  const slider = document.getElementById("sendRow");
  let isDown = false;
  let startX;
  let scrollLeft;

  slider.addEventListener("mousedown", e => {
    isDown = true;
    slider.classList.add("dragging");
    startX = e.pageX - slider.offsetLeft;
    scrollLeft = slider.scrollLeft;
  });

  ["mouseleave", "mouseup"].forEach(evt =>
    slider.addEventListener(evt, () => {
      isDown = false;
      slider.classList.remove("dragging");
    })
  );

  slider.addEventListener("mousemove", e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - slider.offsetLeft;
    const walk = (x - startX) * 1.5;
    slider.scrollLeft = scrollLeft - walk;
  });
</script>

</body>
</html>
